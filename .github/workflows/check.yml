name: Check
on:
  push:
    branches:
      - test-checkout
permissions:
  id-token: write
jobs:
  terraform_plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: 'prod'
          submodules: recursive
          token: ${{ secrets.WORKFLOW_TOKEN }}
          fetch-tags: true
          persist-credentials: false
      - run: echo $(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
