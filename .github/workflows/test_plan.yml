name: DR2 Run Terraform Plan
on:
  pull_request:
    paths:
      - "terraform/**"
permissions:
  id-token: write
  contents: write
jobs:
  test_plan:
    runs-on: ubuntu-latest
    environment: intg
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
          token: ${{ secrets.WORKFLOW_TOKEN }}
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      - uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_NUMBER }}:role/IntgTerraformRole
          aws-region: eu-west-2
          role-session-name: TerraformTestPlan
      - run: |
          terraform init
          terraform workspace select intg
          export TF_VAR_lambda_code_version=$(gh api /repos/nationalarchives/dr2-ingest/tags | jq -r '.[0].name')
          terraform plan -refresh=false -lock=false
        working-directory: terraform
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
