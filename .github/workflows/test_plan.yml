name: DR2 Run Terraform Plan
on:
  pull_request:
    paths:
      - "terraform/**"
permissions:
  id-token: write
  contents: write
jobs:
  test_plan:
    runs-on: ubuntu-latest
    environment: intg
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
          token: ${{ secrets.WORKFLOW_TOKEN }}
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_NUMBER }}:role/IntgTerraformRole
          aws-region: eu-west-2
          role-session-name: TerraformTestPlan
      - run: |
          terraform init
          terraform workspace select intg
          export TF_VAR_lambda_code_version=$(curl https://api.github.com/repos/nationalarchives/dr2-ingest/tags | jq -r '.[0].name')
          terraform plan -refresh=false -lock=false
        working-directory: terraform
