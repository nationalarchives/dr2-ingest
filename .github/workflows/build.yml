name: DR2 Build Project
on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
permissions: {}
jobs:
  pre-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    outputs:
      next-version: ${{ steps.next-tag.outputs.next-version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821 # v1.4.0
      - name: Configure AWS credentials from management account
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: arn:aws:iam::${{ secrets.MANAGEMENT_ACCOUNT }}:role/MgmtDPGithubCodeDeploy
          aws-region: eu-west-2
          role-session-name: GitHubActionsRole
      - id: next-tag
        run: echo next-version=$(curl -s $GITHUB_API_URL/repos/nationalarchives/dr2-ingest/tags | jq -r '.[0].name' | awk -F. -v OFS=. '{ $3++; print }') >> "$GITHUB_OUTPUT"
      - run: |
          rm -rf target/outputs
          mkdir -p target/outputs
          sbt ingestLambdasRoot/assembly
          (cd ./python/lambdas/preingest-importer/ && bash deploy.sh)
          zip -jA preingest-tdr-importer python/lambdas/preingest-importer/lambda_function.py
          cp preingest-tdr-importer target/outputs
          cp preingest-tdr-importer target/outputs/preingest-dri-importer
          cp preingest-tdr-importer target/outputs/preingest-adhoc-importer
          cp preingest-tdr-importer target/outputs/preingest-restore-importer
          zip -jA ingest-metric-collector python/lambdas/ingest-metric-collector/ingest_metric_collector.py
          zip -jA pause-ingest python/lambdas/pause-ingest/pause_ingest.py
          zip -jA pause-preservica-activity python/lambdas/pause-preservica-activity/pause_preservica_activity.py
          zip -jA ip-lock-checker python/lambdas/ip-lock-checker/ip_lock_checker.py
          cp ingest-metric-collector target/outputs
          cp pause-ingest target/outputs
          cp pause-preservica-activity target/outputs
          cp ip-lock-checker target/outputs
          pip install cargo-lambda
          (cd rust/lambdas/courtdoc-anonymiser && cargo lambda build --release -p lambda)
          zip -jA court-document-package-anonymiser rust/lambdas/courtdoc-anonymiser/target/lambda/lambda/bootstrap
          cp court-document-package-anonymiser target/outputs
          python .github/scripts/upload_files.py target/outputs $NEXT_VERSION 
          git tag $NEXT_VERSION
          git push origin $NEXT_VERSION
        env:
          NEXT_VERSION: ${{ steps.next-tag.outputs.next-version }}
          GH_TOKEN: ${{ github.token }}
  deploy:
    needs: pre-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: gh workflow run deploy.yml -f environment=intg -f to-deploy=$NEXT_VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.FINE_GRAINED_TOKEN }}
          NEXT_VERSION: ${{ needs.pre-deploy.outputs.next-version }}
