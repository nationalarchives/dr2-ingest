name: Deploy DR2 Ingest Lambdas
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment'
        required: true
        options:
          - intg
          - staging
          - prod
        default: 'intg'
      to-deploy:
        description: 'Version to deploy'
        required: true
env:
  ENVIRONMENT: ${{ github.event.inputs.environment }}
  TO_DEPLOY: ${{ github.event.inputs.to-deploy }}
jobs:
  terraform_plan:
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.detect_changes.outputs.changes }}
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          token: ${{ secrets.WORKFLOW_TOKEN }}
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_wrapper: false
      - id: role-name
        run: echo role-name="$(echo $ENVIRONMENT | sed -r 's/(^|-)(\w)/\U\2/g')TerraformRole" >> $GITHUB_OUTPUT
      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_NUMBER }}:role/${{ steps.role-name.outputs.role-name }}
          aws-region: eu-west-2
          role-session-name: TerraformDeploy
      - run: pip install boto3
      - name: run_plan
        working-directory: terraform
        env:
          TF_VAR_site_outbound_subnet: ${{ secrets.kew_proxy_outgoing_ip }}
          TF_VAR_custodial_copy_x509_subject_cn: ${{ secrets.custodial_copy_x509_subject_cn }}
        run: |
          terraform init
          terraform workspace select $ENVIRONMENT
          terraform plan -detailed-exitcode || echo $? > exit-code
      - id: detect_changes
        run: |
          EXITCODE=$(cat exit-code || echo 0)
          if [ "$EXITCODE" = "2" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            python ../.github/scripts/send_message.py
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi
        working-directory: terraform
        env:
          MESSAGE: |
            :book: Terraform plan ready for environment ${{ github.event.inputs.environment }}
            :white_check_mark: <https://github.com/nationalarchives/dr2-ingest/actions/runs/${{ github.run_id }}|Approve the workflow>
  terraform_apply:
    permissions:
      id-token: write
      contents: write
    needs: terraform_plan
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    if: needs.terraform_plan.outputs.changes == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          token: ${{ secrets.WORKFLOW_TOKEN }}
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      - id: role-name
        run: echo role-name="$(echo $ENVIRONMENT | sed -r 's/(^|-)(\w)/\U\2/g')TerraformRole" >> $GITHUB_OUTPUT
      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_NUMBER }}:role/${{ steps.role-name.outputs.role-name }}
          aws-region: eu-west-2
          role-session-name: TerraformDeploy
      - run: pip install boto3
      - run: |
          terraform init
          terraform workspace select $ENVIRONMENT
          terraform apply --auto-approve
          python ../.github/scripts/send_message.py
        working-directory: terraform
        env:
          TF_VAR_site_outbound_subnet: ${{ secrets.kew_proxy_outgoing_ip }}
          TF_VAR_custodial_copy_x509_subject_cn: ${{ secrets.custodial_copy_x509_subject_cn }}
          MESSAGE: ":white_check_mark: terraform deploy successful for ${{ github.event.inputs.environment }}"
      - run: |
          git tag $TO_DEPLOY
          git push origin $TO_DEPLOY
        env:
          GH_TOKEN: ${{ github.token }}
  deploy:
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: role-name
        run: echo role-name="$(echo $ENVIRONMENT | sed -r 's/(^|-)(\w)/\U\2/g')DPGithubActionsDeployLambdaRole" >> $GITHUB_OUTPUT
      - name: Configure AWS credentials for Lambda
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_NUMBER }}:role/${{ steps.role-name.outputs.role-name }}
          aws-region: eu-west-2
          role-session-name: ECRLogin
      - run: | 
          pip install boto3
          git tag $TO_DEPLOY
          git push origin $TO_DEPLOY
          python .github/scripts/deploy.py $ENVIRONMENT $TO_DEPLOY
